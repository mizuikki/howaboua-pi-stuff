name: Refresh apply_patch binaries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/pi-codex-conversion/vendor/apply-patch-src/**'
      - 'packages/pi-codex-conversion/scripts/build-apply-patch-binary.mjs'
      - 'packages/pi-codex-conversion/scripts/sync-apply-patch-source.mjs'
      - 'packages/pi-codex-conversion/bin/apply_patch'
      - 'packages/pi-codex-conversion/bin/apply_patch.cmd'
      - 'packages/pi-codex-conversion/src/tools/apply-patch-binary.ts'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_arch: linux-x64
          - os: ubuntu-24.04-arm
            platform_arch: linux-arm64
          - os: macos-13
            platform_arch: darwin-x64
          - os: macos-latest
            platform_arch: darwin-arm64
          - os: windows-latest
            platform_arch: win32-x64
          - os: windows-11-arm
            platform_arch: win32-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build apply_patch
        working-directory: packages/pi-codex-conversion
        run: bun run build:apply-patch
      - uses: actions/upload-artifact@v7
        with:
          name: apply-patch-${{ matrix.platform_arch }}
          path: packages/pi-codex-conversion/vendor/apply-patch/${{ matrix.platform_arch }}/
