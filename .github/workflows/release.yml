name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Add aggregate package changesets
        run: bun run changeset:aggregates
      - name: Changesets release
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version-packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Merge Changesets release PR and queue publish
        if: steps.changesets.outputs.published != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(gh pr list \
            --head changeset-release/main \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -z "$pr_number" ]; then
            exit 0
          fi

          gh pr merge "$pr_number" --merge --auto

          for attempt in {1..40}; do
            state=$(gh pr view "$pr_number" --json state --jq '.state')
            if [ "$state" = "MERGED" ]; then
              gh workflow run release.yml --ref main
              exit 0
            fi
            sleep 3
          done

          echo "Changesets release PR #$pr_number did not merge in time" >&2
          exit 1
      - name: Delete Changesets release branch after publish
        if: steps.changesets.outputs.published == 'true'
        run: git push origin --delete changeset-release/main || true
