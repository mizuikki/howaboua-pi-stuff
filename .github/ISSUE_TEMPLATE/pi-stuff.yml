name: Pi Stuff issue
description: Report a bug, rough edge, or small feature request.
title: ""
body:
  - type: dropdown
    id: package
    attributes:
      label: Which package is this about?
      description: Pick the closest one. “Not sure” is fine.
      options:
        - Not sure / general
        - pi-codex-conversion
        - pi-auto-reasoning-tool
        - pi-auto-trees
        - pi-explore-subagents
        - pi-markdown-workflows
        - pi-memories
        - pi-semantic-grep
        - pi-smart-btw
        - pi-subagent-review
        - pi-vent
        - A skill
    validations:
      required: true

  - type: input
    id: skill
    attributes:
      label: Skill name, if this is about a skill
      description: Optional. Example: anti-ai-copy, chrome-cdp, omarchy-help.
      placeholder: anti-ai-copy

  - type: dropdown
    id: kind
    attributes:
      label: What kind of thing is it?
      options:
        - Bug / broken behavior
        - Confusing UX or docs
        - Feature request
        - Packaging / install / update problem
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Say what you tried, what went wrong, and what you expected instead.
      placeholder: |
        I ran ...
        Expected ...
        Got ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Quick repro, if you have one
      description: Commands, prompts, config snippets, screenshots, or links are all useful. Leave blank if it is more of a vibe/request.
      placeholder: |
        1. Install ...
        2. Run ...
        3. See ...

  - type: input
    id: pi-version
    attributes:
      label: Pi version
      description: Optional, but useful for extension bugs.
      placeholder: pi --version

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, screenshots, rough ideas, or context that did not fit above.
